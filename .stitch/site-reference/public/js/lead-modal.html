<!-- Lead Form Modal — include before </body> on all pages -->
<div id="lead-modal" style="display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;background:rgba(24,30,41,.55);backdrop-filter:blur(4px)">
  <div style="background:#fff;border-radius:12px;max-width:480px;width:92%;max-height:90vh;overflow-y:auto;padding:2rem;position:relative;box-shadow:0 24px 48px rgba(0,0,0,.15)">
    <button onclick="closeLeadModal()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.5rem;cursor:pointer;color:#566075;line-height:1" aria-label="Stäng">&times;</button>
    <h2 style="font-family:Satoshi,sans-serif;font-size:1.5rem;font-weight:700;color:#181E29;margin:0 0 .25rem">Kom igång med Vården.se</h2>
    <p style="color:#566075;font-size:.9375rem;margin:0 0 1.5rem">Fyll i formuläret så kontaktar vi dig inom 24 timmar.</p>
    <form onsubmit="submitLeadForm(event)" style="display:flex;flex-direction:column;gap:1rem">
      <div>
        <label style="display:block;font-size:.8125rem;font-weight:500;color:#181E29;margin-bottom:.25rem">Kliniknamn <span style="color:#991B1B">*</span></label>
        <input name="clinicName" required style="width:100%;padding:.625rem .75rem;border:1px solid rgba(86,96,117,.2);border-radius:8px;font-size:.9375rem;outline:none;transition:border-color .15s" onfocus="this.style.borderColor='#055F72'" onblur="this.style.borderColor='rgba(86,96,117,.2)'">
      </div>
      <div>
        <label style="display:block;font-size:.8125rem;font-weight:500;color:#181E29;margin-bottom:.25rem">Kontaktperson <span style="color:#991B1B">*</span></label>
        <input name="contactName" required style="width:100%;padding:.625rem .75rem;border:1px solid rgba(86,96,117,.2);border-radius:8px;font-size:.9375rem;outline:none;transition:border-color .15s" onfocus="this.style.borderColor='#055F72'" onblur="this.style.borderColor='rgba(86,96,117,.2)'">
      </div>
      <div>
        <label style="display:block;font-size:.8125rem;font-weight:500;color:#181E29;margin-bottom:.25rem">E-post <span style="color:#991B1B">*</span></label>
        <input name="email" type="email" required style="width:100%;padding:.625rem .75rem;border:1px solid rgba(86,96,117,.2);border-radius:8px;font-size:.9375rem;outline:none;transition:border-color .15s" onfocus="this.style.borderColor='#055F72'" onblur="this.style.borderColor='rgba(86,96,117,.2)'">
      </div>
      <div>
        <label style="display:block;font-size:.8125rem;font-weight:500;color:#181E29;margin-bottom:.25rem">Telefon</label>
        <input name="phone" type="tel" style="width:100%;padding:.625rem .75rem;border:1px solid rgba(86,96,117,.2);border-radius:8px;font-size:.9375rem;outline:none;transition:border-color .15s" onfocus="this.style.borderColor='#055F72'" onblur="this.style.borderColor='rgba(86,96,117,.2)'">
      </div>
      <div>
        <label style="display:block;font-size:.8125rem;font-weight:500;color:#181E29;margin-bottom:.25rem">Kategori</label>
        <select name="category" id="lead-category" style="width:100%;padding:.625rem .75rem;border:1px solid rgba(86,96,117,.2);border-radius:8px;font-size:.9375rem;background:#fff;outline:none;cursor:pointer">
          <option value="">Välj kategori...</option>
          <option value="Tandläkare">Tandläkare</option>
          <option value="Vårdcentral">Vårdcentral</option>
          <option value="Specialistvård">Specialistvård</option>
          <option value="Kvinnohälsa">Kvinnohälsa</option>
          <option value="Fysisk hälsa">Fysisk hälsa</option>
          <option value="Psykisk hälsa">Psykisk hälsa</option>
          <option value="Annat">Annat</option>
        </select>
      </div>
      <label style="display:flex;gap:.5rem;align-items:flex-start;font-size:.8125rem;color:#566075;cursor:pointer">
        <input type="checkbox" required style="margin-top:.15rem;accent-color:#055F72">
        <span>Jag godkänner att Vården.se kontaktar mig angående min förfrågan</span>
      </label>
      <button type="submit" style="background:#055F72;color:#fff;border:none;padding:.75rem;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .15s" onmouseover="this.style.background='#4D9BA9'" onmouseout="this.style.background='#055F72'">Skicka förfrågan</button>
    </form>
  </div>
</div>
<style>
  #lead-modal.is-open { display:flex !important; }
  #lead-modal input:focus, #lead-modal select:focus { border-color:#055F72 !important; box-shadow:0 0 0 3px rgba(5,95,114,.12); }
</style>
<script src="js/lead-form.js"></script>
